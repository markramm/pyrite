name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check pyrite/ tests/
          ruff format --check pyrite/ tests/

      - name: Type check with mypy
        continue-on-error: true
        run: mypy pyrite/ --ignore-missing-imports

      - name: Run tests
        run: pytest --cov=pyrite --cov-report=term-missing -W error::DeprecationWarning

  test-optional-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          # Install extensions in dev mode
          for ext in extensions/*/; do
            if [ -f "$ext/pyproject.toml" ]; then
              pip install -e "$ext"
            fi
          done

      - name: Run full test suite (including API/MCP tests)
        run: pytest --cov=pyrite --cov-report=term-missing
