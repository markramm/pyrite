# fly.toml — Fly.io configuration for Pyrite
# Deploy: fly launch --copy-config, then fly deploy

app = "pyrite"  # Change this to your app name

[build]
  dockerfile = "Dockerfile"

[env]
  PYRITE_HOST = "0.0.0.0"
  PYRITE_DATA_DIR = "/data"

[http_service]
  internal_port = 8088
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[mounts]
  source = "pyrite_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
