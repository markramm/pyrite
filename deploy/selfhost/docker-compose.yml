services:
  pyrite:
    build: ../..
    volumes:
      - pyrite-data:/data
      - ../../kb:/seed/pyrite-kb:ro
    environment:
      - PYRITE_HOST=0.0.0.0
      - PYRITE_AUTH_ENABLED=true
      - PYRITE_AUTH_ANONYMOUS_TIER=none
      - PYRITE_AUTH_ALLOW_REGISTRATION=false
      - PYRITE_CORS_ORIGINS=https://${PYRITE_DOMAIN:-localhost}
      - PYRITE_SEARCH_MODE=hybrid
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - PYRITE_DOMAIN=${PYRITE_DOMAIN:-localhost}
    depends_on:
      pyrite:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pyrite-data:
  caddy-data:
  caddy-config:
