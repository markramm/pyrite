name: pyrite
kb_type: software
description: "Pyrite project knowledge base — architecture decisions, standards, component docs, backlog, and runbooks"

guidelines:
  contributing: "Follow ADRs for architectural decisions. Update component docs when changing module boundaries."
  quality: "Every entry must be actionable. Prefer concrete examples over abstract descriptions."
  naming: "Use kebab-case for entry IDs. Prefix ADRs with adr-NNNN."

goals:
  primary: "Provide complete, navigable context for humans and AI agents working on Pyrite."
  success_criteria: "An agent can find any architectural decision, component API, or backlog item in under 3 search queries."

evaluation_rubric:
  - "Entry has a clear, specific title (not generic like 'Update' or 'Notes')"
  - "Entry body explains the why, not just the what"
  - "ADRs link to the backlog items that motivated them"
  - "Component docs specify dependencies and public API"

types:
  component:
    description: "A software component, module, or service in the Pyrite codebase"
    guidelines: "Document the module's responsibility, public API, and key dependencies. Include the filesystem path."
    goals: "Enable an agent to understand what a module does and how to use it without reading source code."
    evaluation_rubric:
      - "Component specifies its filesystem path"
      - "Component lists its dependencies"
      - "Component describes its public API or responsibility"

  adr:
    description: "Architecture Decision Record capturing a significant design choice"
    guidelines: "State the problem, considered alternatives, and rationale for the decision. Link to related ADRs."
    goals: "Preserve decision context so future developers understand why, not just what."
    evaluation_rubric:
      - "ADR has a status (proposed, accepted, superseded, deprecated)"
      - "ADR describes the problem being solved"
      - "ADR lists alternatives that were considered"
      - "ADR explains the rationale for the chosen approach"

  backlog_item:
    description: "A work item tracking planned or in-progress development work"
    guidelines: "Include clear acceptance criteria. Set priority and effort estimates. Link to relevant ADRs."
    goals: "Enable agents to pick up work items and understand what 'done' looks like."
    evaluation_rubric:
      - "Backlog item has a status (proposed, planned, in-progress, done)"
      - "Backlog item has a priority level"
      - "Backlog item describes acceptance criteria or definition of done"

  standard:
    description: "A coding standard, convention, or process rule for the project"
    guidelines: "Be prescriptive. Include examples of correct and incorrect usage where possible."
    goals: "Ensure consistent code and process across all contributors, human and AI."
    evaluation_rubric:
      - "Standard includes at least one concrete example"
      - "Standard is specific enough to be mechanically verifiable"
